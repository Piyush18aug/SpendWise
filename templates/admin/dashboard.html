<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpendWise Admin Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="{% url 'admin_dashboard' %}"
          >SpendWise Admin</a
        >
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'admin_dashboard' %}"
                >Dashboard</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'admin_users' %}">Users</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'admin_transactions' %}"
                >Transactions</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'admin_logout' %}">Logout</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container">
      <h2 class="mb-4">System Summary</h2>
      <div class="row mb-4">
        <div class="col-md-3">
          <div class="card text-white bg-primary mb-3">
            <div class="card-header">Total Users</div>
            <div class="card-body">
              <h5 class="card-title">{{ total_users }}</h5>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card text-white bg-success mb-3">
            <div class="card-header">Total Income</div>
            <div class="card-body">
              <h5 class="card-title">${{ total_income }}</h5>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card text-white bg-danger mb-3">
            <div class="card-header">Total Expenses</div>
            <div class="card-body">
              <h5 class="card-title">${{ total_expenses }}</h5>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card text-white bg-info mb-3">
            <div class="card-header">Total Transactions</div>
            <div class="card-body">
              <h5 class="card-title">{{ total_transactions }}</h5>
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-12 text-center">
          <a href="{% url 'admin_export_csv' %}" class="btn btn-outline-primary"
            >Export System CSV</a
          >
          <a href="{% url 'admin_export_pdf' %}" class="btn btn-outline-danger"
            >Export System PDF</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
